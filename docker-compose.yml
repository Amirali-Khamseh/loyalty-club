services:
  postgres:
    image: postgres:16-alpine
    container_name: loyalty-club-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: loyalty_club
      POSTGRES_USER: loyalty_admin
      POSTGRES_PASSWORD: loyalty_admin
    ports:
      - "5432:5432"
    volumes:
      - loyalty_club_postgres_data:/var/lib/postgresql/data

volumes:
  loyalty_club_postgres_data:
